apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zeep-orbit.fullname" . }}
  labels:
    {{- include "zeep-orbit.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl é obrigatório" .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.dashboardBootstrapSecret }}
  DASHBOARD_BOOTSTRAP_SECRET: {{ .Values.secrets.dashboardBootstrapSecret | quote }}
  {{- end }}
  {{- with .Values.secrets.google }}
  GOOGLE_CLIENT_ID: {{ required "secrets.google.clientId é obrigatório" .clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ required "secrets.google.clientSecret é obrigatório" .clientSecret | quote }}
  GOOGLE_REDIRECT_URL: {{ required "secrets.google.redirectUrl é obrigatório" .redirectUrl | quote }}
  {{- if .allowedDomains }}
  GOOGLE_ALLOWED_DOMAINS: {{ .allowedDomains | quote }}
  {{- end }}
  {{- end }}
  {{- range $appName, $appConfig := .Values.secrets.apps }}
  {{ upper $appName }}_JWT_SECRET: {{ required (printf "secrets.apps.%s.jwtSecret é obrigatório" $appName) $appConfig.jwtSecret | quote }}
  {{- end }}
  {{- with .Values.secrets.storage }}
  STORAGE_ENDPOINT: {{ .endpoint | quote }}
  STORAGE_BUCKET: {{ .bucket | quote }}
  STORAGE_REGION: {{ .region | quote }}
  STORAGE_ACCESS_KEY_ID: {{ .accessKeyId | quote }}
  STORAGE_SECRET_ACCESS_KEY: {{ .secretAccessKey | quote }}
  {{- end }}
