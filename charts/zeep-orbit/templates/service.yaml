apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeep-orbit.fullname" . }}
  labels:
    {{- include "zeep-orbit.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "zeep-orbit.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
