apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeep-core.fullname" . }}
  labels:
    {{- include "zeep-core.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "zeep-core.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
