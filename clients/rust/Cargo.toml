[package]
name = "zeep-orbit-client"
version = "0.1.1"
edition = "2021"
description = "Rust client for Zeep Orbit — auto-generated REST APIs for your apps"
license = "MIT"
repository = "https://github.com/zeeplabs/zeep-orbit"
homepage = "https://github.com/zeeplabs/zeep-orbit"
keywords = ["zeep", "orbit", "baas", "api-client", "rest"]
categories = ["api-bindings", "web-programming"]
readme = "README.md"

[dependencies]
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
