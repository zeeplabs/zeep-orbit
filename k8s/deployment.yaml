apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeep-orbit
  labels:
    app: zeep-orbit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zeep-orbit
  template:
    metadata:
      labels:
        app: zeep-orbit
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: zeep-orbit
          # Para produção, pin por digest imutável:
          # image: ghcr.io/zeeplabs/zeep-orbit@sha256:<digest>
          image: ghcr.io/zeeplabs/zeep-orbit:latest
          imagePullPolicy: Always
          args: ["serve", "--config", "/app/apps.yaml"]
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: zeep-orbit-secret
          env:
            - name: BRAND_THEME
              value: "azure"
            - name: BRAND_COMPANY_NAME
              value: "Zeep Tecnologia"
          volumeMounts:
            - name: config
              mountPath: /app/apps.yaml
              subPath: apps.yaml
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: zeep-orbit-config
