apiVersion: v1
kind: ConfigMap
metadata:
  name: zeep-orbit-config
  labels:
    app: zeep-orbit
data:
  apps.yaml: |
    platform:
      database_url: ${DATABASE_URL}

    apps:
      - name: billing
        auth:
          jwt_secret: ${BILLING_JWT_SECRET}
        tables:
          - name: invoices
            columns:
              - name: amount
                type: decimal
                required: true
              - name: status
                type: text
                required: true
              - name: tenant
                type: uuid
                required: true
          - name: payments
            columns:
              - name: amount
                type: decimal
                required: true
              - name: method
                type: text
                required: true
              - name: invoice
                type: uuid
                required: true
              - name: paid
                type: timestamptz

      - name: inventory
        auth:
          jwt_secret: ${INVENTORY_JWT_SECRET}
        tables:
          - name: products
            columns:
              - name: sku
                type: text
                required: true
              - name: name
                type: text
                required: true
              - name: unit
                type: text
                required: true
          - name: movements
            columns:
              - name: product
                type: uuid
                required: true
              - name: quantity
                type: integer
                required: true
              - name: type
                type: text
                required: true
              - name: reference
                type: text
