# TEMPLATE ONLY — NÃO COMMITAR COM VALORES REAIS.
# Criar o Secret fora do GitOps:
#
#   kubectl create secret generic zeep-core-secret \
#     --from-literal=DATABASE_URL="postgres://..." \
#     --from-literal=BILLING_JWT_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=INVENTORY_JWT_SECRET="$(openssl rand -base64 32)"
#
# Alternativas GitOps-safe: SealedSecrets, SOPS/age, External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: zeep-core-secret
  labels:
    app: zeep-core
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:password@host:5432/dbname?sslmode=require"
  BILLING_JWT_SECRET: "change-me-min-32-bytes"
  INVENTORY_JWT_SECRET: "change-me-min-32-bytes"
